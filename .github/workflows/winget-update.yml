name: Submit WinGet Update

on:
  workflow_dispatch:
    inputs:
      package_identifier:
        description: "WinGet package identifier"
        required: true
        default: "Rotstein.SmashedPumpkin"
        type: string
      version:
        description: "Package version (e.g. 0.4.1)"
        required: true
        type: string
      installer_url_x64:
        description: "Direct HTTPS URL to x64 MSI"
        required: true
        type: string

permissions:
  contents: read

jobs:
  submit-winget-update:
    runs-on: windows-latest
    steps:
      - name: Validate inputs
        id: validate
        shell: pwsh
        run: |
          $packageId = "${{ inputs.package_identifier }}"
          $version = "${{ inputs.version }}"
          $urlRaw = "${{ inputs.installer_url_x64 }}"
          $url = $urlRaw.Trim().Trim('"').Trim("'").Trim('<').Trim('>')

          if ([string]::IsNullOrWhiteSpace($packageId) -or [string]::IsNullOrWhiteSpace($version) -or [string]::IsNullOrWhiteSpace($url)) {
            throw "package_identifier, version and installer_url_x64 are required."
          }

          if (-not ($url -match '^https://')) {
            throw "installer_url_x64 must be a direct HTTPS URL (for example: https://github.com/.../smashed-pumpkin-windows-x64.msi)."
          }

          try {
            $uri = [System.Uri]::new($url)
          } catch {
            throw "installer_url_x64 is not a valid URL."
          }

          if ($uri.AbsolutePath -notmatch '\.msi$') {
            throw "installer_url_x64 must point to a .msi file (not a .zip artifact)."
          }

          if ($url -match 'actions-results|blob\.core\.windows\.net') {
            throw "installer_url_x64 appears to be a temporary Actions artifact URL. Use a permanent URL (for example a GitHub Release .msi asset URL)."
          }

          "package_id=$packageId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_url_x64=$url" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify secret
        shell: pwsh
        env:
          WINGET_SUBMIT_TOKEN: ${{ secrets.WINGET_SUBMIT_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_SUBMIT_TOKEN)) {
            throw "Missing repository secret WINGET_SUBMIT_TOKEN."
          }

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          if (-not (Test-Path .\wingetcreate.exe)) {
            throw "wingetcreate.exe download failed."
          }

      - name: Check package existence in winget-pkgs
        id: package_exists
        shell: pwsh
        run: |
          $packageId = "${{ steps.validate.outputs.package_id }}"
          .\wingetcreate.exe show $packageId *> $null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Package '$packageId' already exists in winget-pkgs. Running update flow."
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Package '$packageId' does not exist in winget-pkgs yet. Running initial onboarding flow."
          }

      - name: Submit update to winget-pkgs
        if: steps.package_exists.outputs.exists == 'true'
        shell: pwsh
        env:
          WINGET_SUBMIT_TOKEN: ${{ secrets.WINGET_SUBMIT_TOKEN }}
        run: |
          $packageId = "${{ steps.validate.outputs.package_id }}"
          $version = "${{ steps.validate.outputs.version }}"
          $url = "${{ steps.validate.outputs.installer_url_x64 }}"

          Write-Host "Submitting WinGet update: $packageId $version"
          Write-Host "Installer URL: $url"

          .\wingetcreate.exe update $packageId `
            -u "$url|x64" `
            -v $version `
            -t $env:WINGET_SUBMIT_TOKEN `
            --submit

      - name: Submit initial package to winget-pkgs
        if: steps.package_exists.outputs.exists == 'false'
        shell: pwsh
        env:
          WINGET_SUBMIT_TOKEN: ${{ secrets.WINGET_SUBMIT_TOKEN }}
        run: |
          $packageId = "${{ steps.validate.outputs.package_id }}"
          $version = "${{ steps.validate.outputs.version }}"
          $url = "${{ steps.validate.outputs.installer_url_x64 }}"
          $publisher = "Rotstein"
          $packageName = "Smashed Pumpkin"
          $shortDescription = "Desktop management app for Pumpkin servers."

          Write-Host "Preparing initial winget manifest for: $packageId $version"
          Invoke-WebRequest $url -OutFile installer-x64.msi

          $sha = (Get-FileHash installer-x64.msi -Algorithm SHA256).Hash.ToUpperInvariant()

          $installer = New-Object -ComObject WindowsInstaller.Installer
          $database = $installer.GetType().InvokeMember('OpenDatabase', 'InvokeMethod', $null, $installer, @('installer-x64.msi', 0))
          $view = $database.OpenView("SELECT `Value` FROM `Property` WHERE `Property`='ProductCode'")
          $view.Execute()
          $record = $view.Fetch()
          if (-not $record) { throw "Could not read ProductCode from MSI." }
          $productCode = $record.StringData(1)
          if ([string]::IsNullOrWhiteSpace($productCode)) { throw "ProductCode in MSI is empty." }

          New-Item -ItemType Directory -Path winget -Force | Out-Null

          @"
          PackageIdentifier: $packageId
          PackageVersion: $version
          InstallerType: msi
          Scope: machine
          Installers:
          - Architecture: x64
            InstallerUrl: $url
            InstallerSha256: $sha
            ProductCode: '$productCode'
          ManifestType: installer
          ManifestVersion: 1.6.0
          "@ | Set-Content "winget/$packageId.installer.yaml"

          @"
          PackageIdentifier: $packageId
          PackageVersion: $version
          PackageLocale: en-US
          Publisher: $publisher
          PackageName: $packageName
          ShortDescription: $shortDescription
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          "@ | Set-Content "winget/$packageId.locale.en-US.yaml"

          @"
          PackageIdentifier: $packageId
          PackageVersion: $version
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          "@ | Set-Content "winget/$packageId.yaml"

          Write-Host "Submitting initial winget package PR..."
          .\wingetcreate.exe submit "winget/$packageId.yaml" `
            -p "$packageId $version" `
            -t $env:WINGET_SUBMIT_TOKEN `
            -n
