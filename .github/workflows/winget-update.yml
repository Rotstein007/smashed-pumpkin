name: Submit WinGet Update

on:
  workflow_run:
    workflows: ["Desktop Builds"]
    types: [completed]
  workflow_dispatch:
    inputs:
      package_identifier:
        description: "WinGet package identifier"
        required: true
        default: "Rotstein.SmashedPumpkin"
        type: string
      version:
        description: "Package version (e.g. 0.4.1)"
        required: true
        type: string
      installer_url_x64:
        description: "Direct HTTPS URL to x64 MSI (optional; can be auto-resolved from GitHub release)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: winget-${{ github.event.release.tag_name || inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  submit-winget-update:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        startsWith(github.event.workflow_run.head_branch, 'v')
      )
    runs-on: windows-latest
    steps:
      - name: Validate inputs
        id: validate
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $isWorkflowRunEvent = "${{ github.event_name }}" -eq "workflow_run"
          $packageId = if ($isWorkflowRunEvent) { "Rotstein.SmashedPumpkin" } else { "${{ inputs.package_identifier }}" }
          $versionInput = if ($isWorkflowRunEvent) { "${{ github.event.workflow_run.head_branch }}" } else { "${{ inputs.version }}" }
          $version = $versionInput.Trim()
          $urlRaw = if ($isWorkflowRunEvent) { "" } else { "${{ inputs.installer_url_x64 }}" }
          $url = $urlRaw.Trim().Trim('"').Trim("'").Trim('<').Trim('>')
          $repo = "${{ github.repository }}"

          if ([string]::IsNullOrWhiteSpace($packageId) -or [string]::IsNullOrWhiteSpace($version)) {
            throw "package_identifier and version are required."
          }

          $normalizedVersion = if ($version.StartsWith("v")) { $version.Substring(1) } else { $version }
          $tagVersion = if ($version.StartsWith("v")) { $version } else { "v$version" }

          function Resolve-ReleaseMsiUrl {
            param([string]$Repository, [string]$TagVersion)

            $api = "https://api.github.com/repos/$Repository/releases/tags/$TagVersion"
            $headers = @{
              Accept = "application/vnd.github+json"
            }
            if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
              $headers["Authorization"] = "Bearer $($env:GITHUB_TOKEN)"
            }

            try {
              $release = Invoke-RestMethod -Uri $api -Headers $headers -Method Get
            } catch {
              throw "Could not resolve release '$TagVersion' in '$Repository'. Provide a direct MSI URL or ensure the release exists."
            }

            $asset = $release.assets | Where-Object { $_.name -eq "smashed-pumpkin-windows-x64.msi" } | Select-Object -First 1
            if (-not $asset) {
              $asset = $release.assets | Where-Object { $_.name -match 'x64.*\.msi$' } | Select-Object -First 1
            }
            if (-not $asset) {
              $asset = $release.assets | Where-Object { $_.name -match '\.msi$' } | Select-Object -First 1
            }
            if (-not $asset) {
              throw "Release '$TagVersion' has no MSI asset. Expected 'smashed-pumpkin-windows-x64.msi'."
            }

            return [string]$asset.browser_download_url
          }

          $needsResolve = $false
          if ([string]::IsNullOrWhiteSpace($url)) {
            $needsResolve = $true
          } elseif (-not ($url -match '^https://')) {
            $needsResolve = $true
          } else {
            try {
              $uri = [System.Uri]::new($url)
            } catch {
              $needsResolve = $true
            }

            if (-not $needsResolve) {
              if ($uri.AbsolutePath -notmatch '\.msi$') {
                $needsResolve = $true
              }
              if ($url -match 'actions-results|blob\.core\.windows\.net') {
                $needsResolve = $true
              }
            }
          }

          if ($needsResolve) {
            Write-Host "installer_url_x64 is missing or not a stable direct MSI URL. Resolving from release $tagVersion ..."
            $url = Resolve-ReleaseMsiUrl -Repository $repo -TagVersion $tagVersion
            Write-Host "Resolved MSI URL: $url"
          }

          if (-not ($url -match '^https://')) {
            throw "installer_url_x64 must resolve to a direct HTTPS MSI URL."
          }
          try {
            $uri = [System.Uri]::new($url)
          } catch {
            throw "Resolved installer_url_x64 is not a valid URL."
          }
          if ($uri.AbsolutePath -notmatch '\.msi$') {
            throw "installer_url_x64 must point to a .msi file (not a .zip artifact)."
          }
          if ($url -match 'actions-results|blob\.core\.windows\.net') {
            throw "installer_url_x64 appears to be a temporary Actions artifact URL. Use a permanent GitHub Release MSI URL."
          }

          "package_id=$packageId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$normalizedVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_url_x64=$url" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify secret
        shell: pwsh
        env:
          WINGET_SUBMIT_TOKEN: ${{ secrets.WINGET_SUBMIT_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_SUBMIT_TOKEN)) {
            throw "Missing repository secret WINGET_SUBMIT_TOKEN."
          }

      - name: Check for existing open WinGet PR
        id: existing_pr
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $packageId = "${{ steps.validate.outputs.package_id }}"
          $version = "${{ steps.validate.outputs.version }}"
          $title = "$packageId $version"
          $query = [uri]::EscapeDataString("repo:microsoft/winget-pkgs is:pr is:open `"$title`"")
          $headers = @{
            Accept = "application/vnd.github+json"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            $headers["Authorization"] = "Bearer $($env:GITHUB_TOKEN)"
          }

          $response = Invoke-RestMethod -Uri "https://api.github.com/search/issues?q=$query" -Headers $headers -Method Get
          $match = $response.items | Where-Object { $_.title -eq $title } | Select-Object -First 1

          if ($match) {
            "should_submit=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "existing_pr_url=$($match.html_url)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "An open WinGet PR for $title already exists: $($match.html_url)"
          } else {
            "should_submit=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No open WinGet PR found for $title."
          }

      - name: Install wingetcreate
        if: steps.existing_pr.outputs.should_submit == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $target = Join-Path $PWD "wingetcreate.exe"
          $urls = @(
            "https://aka.ms/wingetcreate/latest",
            "https://github.com/microsoft/winget-create/releases/latest/download/wingetcreate.exe"
          )

          $downloaded = $false
          foreach ($url in $urls) {
            Write-Host "Downloading wingetcreate from: $url"
            & curl.exe -fL --retry 8 --retry-delay 2 --retry-all-errors $url -o $target
            if ($LASTEXITCODE -eq 0 -and (Test-Path $target) -and ((Get-Item $target).Length -gt 0)) {
              $downloaded = $true
              break
            }
          }

          if (-not $downloaded) {
            throw "wingetcreate.exe download failed after retries and fallback URLs."
          }

      - name: Check package existence in winget-pkgs
        if: steps.existing_pr.outputs.should_submit == 'true'
        id: package_exists
        shell: pwsh
        run: |
          $packageId = "${{ steps.validate.outputs.package_id }}"
          $PSNativeCommandUseErrorActionPreference = $false
          & .\wingetcreate.exe show $packageId *> $null
          $exists = ($LASTEXITCODE -eq 0)

          if ($exists) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Package '$packageId' already exists in winget-pkgs. Running update flow."
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Package '$packageId' does not exist in winget-pkgs yet. Running initial onboarding flow."
          }

          exit 0

      - name: Submit update to winget-pkgs
        if: steps.existing_pr.outputs.should_submit == 'true' && steps.package_exists.outputs.exists == 'true'
        shell: pwsh
        env:
          WINGET_SUBMIT_TOKEN: ${{ secrets.WINGET_SUBMIT_TOKEN }}
        run: |
          $packageId = "${{ steps.validate.outputs.package_id }}"
          $version = "${{ steps.validate.outputs.version }}"
          $url = "${{ steps.validate.outputs.installer_url_x64 }}"

          Write-Host "Submitting WinGet update: $packageId $version"
          Write-Host "Installer URL: $url"

          .\wingetcreate.exe update $packageId `
            -u "$url|x64" `
            -v $version `
            -t $env:WINGET_SUBMIT_TOKEN `
            --submit

      - name: Submit initial package to winget-pkgs
        if: steps.existing_pr.outputs.should_submit == 'true' && steps.package_exists.outputs.exists == 'false'
        shell: pwsh
        env:
          WINGET_SUBMIT_TOKEN: ${{ secrets.WINGET_SUBMIT_TOKEN }}
        run: |
          $packageId = "${{ steps.validate.outputs.package_id }}"
          $version = "${{ steps.validate.outputs.version }}"
          $url = "${{ steps.validate.outputs.installer_url_x64 }}"
          $publisher = "Rotstein"
          $packageName = "Smashed Pumpkin"
          $shortDescription = "Desktop management app for Pumpkin servers."
          $releaseNotesUrl = "https://github.com/${{ github.repository }}/releases/tag/v$version"
          $packageUrl = "https://github.com/${{ github.repository }}"
          $licenseUrl = "$packageUrl/blob/${{ github.sha }}/LICENSE"

          Write-Host "Preparing initial winget manifest for: $packageId $version"
          Invoke-WebRequest $url -OutFile installer-x64.msi

          $sha = (Get-FileHash installer-x64.msi -Algorithm SHA256).Hash.ToUpperInvariant()

          $installer = New-Object -ComObject WindowsInstaller.Installer
          $database = $installer.GetType().InvokeMember('OpenDatabase', 'InvokeMethod', $null, $installer, @('installer-x64.msi', 0))
          $view = $database.OpenView("SELECT `Value` FROM `Property` WHERE `Property`='ProductCode'")
          $view.Execute()
          $record = $view.Fetch()
          if (-not $record) { throw "Could not read ProductCode from MSI." }
          $productCode = $record.StringData(1)
          if ([string]::IsNullOrWhiteSpace($productCode)) { throw "ProductCode in MSI is empty." }

          New-Item -ItemType Directory -Path winget -Force | Out-Null

          @"
          PackageIdentifier: $packageId
          PackageVersion: $version
          InstallerType: msi
          Scope: machine
          Installers:
          - Architecture: x64
            InstallerUrl: $url
            InstallerSha256: $sha
            ProductCode: '$productCode'
          ManifestType: installer
          ManifestVersion: 1.6.0
          "@ | Set-Content "winget/$packageId.installer.yaml"

          @"
          PackageIdentifier: $packageId
          PackageVersion: $version
          PackageLocale: en-US
          Publisher: $publisher
          PublisherUrl: $packageUrl
          PublisherSupportUrl: $packageUrl/issues
          PackageName: $packageName
          PackageUrl: $packageUrl
          License: GPL-3.0-or-later
          LicenseUrl: $licenseUrl
          ShortDescription: $shortDescription
          Description: Manage Pumpkin Minecraft servers and server networks from a native GTK desktop app.
          Moniker: smashed-pumpkin
          ReleaseNotesUrl: $releaseNotesUrl
          Tags:
          - minecraft
          - pumpkin
          - server
          - gtk
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          "@ | Set-Content "winget/$packageId.locale.en-US.yaml"

          @"
          PackageIdentifier: $packageId
          PackageVersion: $version
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          "@ | Set-Content "winget/$packageId.yaml"

          Write-Host "Submitting initial winget package PR..."
          .\wingetcreate.exe submit "winget" `
            -p "$packageId $version" `
            -t $env:WINGET_SUBMIT_TOKEN

      - name: Skip duplicate WinGet submission
        if: steps.existing_pr.outputs.should_submit != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping WinGet submission because an open PR already exists:"
          Write-Host "${{ steps.existing_pr.outputs.existing_pr_url }}"
