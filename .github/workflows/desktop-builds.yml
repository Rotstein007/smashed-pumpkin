name: Desktop Builds

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: desktop-builds-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  linux-native:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Configure
        run: meson setup build --buildtype=release

      - name: Build
        run: meson compile -C build

      - name: Package
        run: |
          mkdir -p dist
          cp build/src/smashed-pumpkin dist/
          if [ -f build/src/smashed-pumpkin-tray ]; then
            cp build/src/smashed-pumpkin-tray dist/
          fi
          tar -czf "smashed-pumpkin-linux-${{ matrix.arch }}.tar.gz" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smashed-pumpkin-linux-${{ matrix.arch }}
          path: smashed-pumpkin-linux-${{ matrix.arch }}.tar.gz
          retention-days: 14

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
          - os: macos-15
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install meson ninja pkg-config gtk4 libadwaita libsoup

      - name: Configure
        run: meson setup build --buildtype=release

      - name: Build
        run: meson compile -C build

      - name: Build macOS app bundle
        shell: bash
        run: |
          VERSION="$(sed -n "s/.*version: '\\([^']*\\)'.*/\\1/p" meson.build | head -n1)"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not resolve app version from meson.build"
            exit 1
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "Tag version (${TAG_VERSION}) does not match meson.build version (${VERSION})."
              exit 1
            fi
          fi

          APP_NAME="Smashed Pumpkin.app"
          APP_ROOT="dist/${APP_NAME}"
          CONTENTS="${APP_ROOT}/Contents"
          MACOS_DIR="${CONTENTS}/MacOS"
          RES_DIR="${CONTENTS}/Resources"

          rm -rf dist
          mkdir -p "${MACOS_DIR}" "${RES_DIR}"
          cp build/src/smashed-pumpkin "${MACOS_DIR}/smashed-pumpkin"
          chmod +x "${MACOS_DIR}/smashed-pumpkin"

          cat > "${CONTENTS}/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Smashed Pumpkin</string>
            <key>CFBundleDisplayName</key>
            <string>Smashed Pumpkin</string>
            <key>CFBundleIdentifier</key>
            <string>dev.rotstein.SmashedPumpkin</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>smashed-pumpkin</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
          </dict>
          </plist>
          EOF

          ditto -c -k --sequesterRsrc --keepParent "${APP_ROOT}" "smashed-pumpkin-macos-${{ matrix.arch }}.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smashed-pumpkin-macos-${{ matrix.arch }}
          path: smashed-pumpkin-macos-${{ matrix.arch }}.app.zip
          retention-days: 14

  flatpak:
    name: Flatpak ${{ matrix.flatpak_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flatpak_arch: x86_64
            runner: ubuntu-latest
          - flatpak_arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          export XDG_RUNTIME_DIR=/tmp/xdg-runtime-$UID
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user remote-add --if-not-exists flathub-beta https://dl.flathub.org/beta-repo/flathub-beta.flatpakrepo

      - name: Build Flatpak
        run: |
          export XDG_RUNTIME_DIR=/tmp/xdg-runtime-$UID
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          flatpak-builder \
            --user \
            --repo=flatpak-repo \
            --install-deps-from=flathub \
            --install-deps-from=flathub-beta \
            --force-clean \
            --disable-rofiles-fuse \
            build-dir \
            build-aux/flatpak/dev.rotstein.SmashedPumpkin.json

      - name: Bundle Flatpak
        run: |
          flatpak build-bundle \
            --arch=${{ matrix.flatpak_arch }} \
            flatpak-repo \
            SmashedPumpkin-${{ matrix.flatpak_arch }}.flatpak \
            dev.rotstein.SmashedPumpkin \
            master

      - name: Upload Flatpak Bundle
        uses: actions/upload-artifact@v4
        with:
          name: SmashedPumpkin-${{ matrix.flatpak_arch }}.flatpak
          path: SmashedPumpkin-${{ matrix.flatpak_arch }}.flatpak
          retention-days: 14

  windows:
    name: Windows ${{ matrix.arch }} (MSI)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msystem: MINGW64
            wix_arch: x64
            winget_arch: x64
            install: >-
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-meson
              mingw-w64-x86_64-ninja
              mingw-w64-x86_64-pkgconf
              mingw-w64-x86_64-gtk4
              mingw-w64-x86_64-libadwaita
              mingw-w64-x86_64-libsoup3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: ${{ matrix.msystem }}
          install: ${{ matrix.install }}

      - name: Resolve app version
        id: version
        shell: powershell
        run: |
          $line = Select-String -Path meson.build -Pattern "version:\s*'([^']+)'" | Select-Object -First 1
          if (-not $line) { throw "Could not resolve version from meson.build" }
          $version = $line.Matches[0].Groups[1].Value
          if (-not $version) { throw "Could not resolve version from meson.build" }
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $tagVersion = "${{ github.ref_name }}".Substring(1)
            if ($tagVersion -ne $version) {
              throw "Tag version ($tagVersion) does not match meson.build version ($version)"
            }
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: msys2 {0}
        run: meson setup build --buildtype=release

      - name: Build
        shell: msys2 {0}
        run: meson compile -C build

      - name: Collect Windows bundle
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/src/smashed-pumpkin.exe dist/
          if [ -f build/src/smashed-pumpkin-tray.exe ]; then
            cp build/src/smashed-pumpkin-tray.exe dist/
          fi
          for exe in dist/*.exe; do
            ldd "$exe" | awk '/mingw|clangarm64/ {print $3}' | while read -r dll; do
              if [ -n "$dll" ] && [ -f "$dll" ]; then
                cp -n "$dll" dist/
              fi
            done
          done

      - name: Install WiX Toolset
        shell: powershell
        run: choco install wixtoolset --yes --no-progress

      - name: Build MSI
        shell: powershell
        run: |
          $wixRoot = Get-ChildItem 'C:\Program Files (x86)' -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixRoot) { throw 'WiX Toolset installation not found.' }
          $wixBin = Join-Path $wixRoot.FullName 'bin'
          $env:PATH = "$wixBin;$env:PATH"

          $arch = "${{ matrix.wix_arch }}"
          $platform = if ($arch -eq 'x86') { 'x86' } elseif ($arch -eq 'arm64') { 'arm64' } else { 'x64' }
          $version = "${{ steps.version.outputs.value }}"
          $upgradeCode = '8E643E21-5F9C-4D1C-89F1-A6B72E01F620'
          $programFilesDir = if ($platform -eq 'x86') { 'ProgramFilesFolder' } else { 'ProgramFiles64Folder' }

          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" Name="Smashed Pumpkin" Language="1033" Version="$version" Manufacturer="Rotstein" UpgradeCode="$upgradeCode">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" Platform="$platform" />
              <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="$programFilesDir">
                  <Directory Id="INSTALLDIR" Name="Smashed Pumpkin" />
                </Directory>
              </Directory>

              <Feature Id="MainFeature" Title="Smashed Pumpkin" Level="1">
                <ComponentGroupRef Id="AppFiles" />
              </Feature>
            </Product>
          </Wix>
          "@ | Set-Content Product.wxs

          heat dir dist -nologo -gg -srd -sreg -scom -cg AppFiles -dr INSTALLDIR -var var.SourceDir -out Files.wxs
          candle -nologo -arch $arch -dSourceDir="dist" Product.wxs Files.wxs
          light -nologo Product.wixobj Files.wixobj -out "smashed-pumpkin-windows-${{ matrix.arch }}.msi"

      - name: Generate winget metadata
        shell: powershell
        run: |
          $msi = "smashed-pumpkin-windows-${{ matrix.arch }}.msi"
          $sha = (Get-FileHash $msi -Algorithm SHA256).Hash.ToUpperInvariant()

          $installer = New-Object -ComObject WindowsInstaller.Installer
          $database = $installer.GetType().InvokeMember('OpenDatabase', 'InvokeMethod', $null, $installer, @($msi, 0))
          $view = $database.OpenView("SELECT `Value` FROM `Property` WHERE `Property`='ProductCode'")
          $view.Execute()
          $record = $view.Fetch()
          $productCode = $record.StringData(1)

          New-Item -ItemType Directory -Path winget -Force | Out-Null
          @{
            architecture   = "${{ matrix.winget_arch }}"
            installer_file = $msi
            sha256         = $sha
            product_code   = $productCode
          } | ConvertTo-Json | Set-Content "winget/${{ matrix.arch }}.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smashed-pumpkin-windows-${{ matrix.arch }}
          path: |
            smashed-pumpkin-windows-${{ matrix.arch }}.msi
            winget/${{ matrix.arch }}.json
          retention-days: 14

  winget-manifests:
    name: Build winget manifests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: smashed-pumpkin-windows-*
          path: windows-artifacts

      - name: Generate winget YAML files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          VERSION="$(sed -n "s/.*version: '\\([^']*\\)'.*/\\1/p" meson.build | head -n1)"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not resolve app version from meson.build"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match meson.build version (${VERSION})."
            exit 1
          fi
          OUT_DIR="winget"
          mkdir -p "$OUT_DIR"

          PKG_ID="Rotstein.SmashedPumpkin"
          INSTALLER_FILE="$OUT_DIR/${PKG_ID}.installer.yaml"
          LOCALE_FILE="$OUT_DIR/${PKG_ID}.locale.en-US.yaml"
          VERSION_FILE="$OUT_DIR/${PKG_ID}.yaml"

          {
            echo "PackageIdentifier: ${PKG_ID}"
            echo "PackageVersion: ${VERSION}"
            echo "InstallerType: msi"
            echo "Scope: machine"
            echo "Installers:"
          } > "$INSTALLER_FILE"

          found=0
          for meta in windows-artifacts/**/winget/*.json; do
            found=1
            arch=$(jq -r '.architecture' "$meta")
            file=$(jq -r '.installer_file' "$meta")
            sha=$(jq -r '.sha256' "$meta")
            product_code=$(jq -r '.product_code' "$meta")
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${file}"

            {
              echo "- Architecture: ${arch}"
              echo "  InstallerUrl: ${url}"
              echo "  InstallerSha256: ${sha}"
              echo "  ProductCode: '${product_code}'"
            } >> "$INSTALLER_FILE"
          done

          if [[ "$found" -eq 0 ]]; then
            echo "No winget metadata found from Windows jobs."
            exit 1
          fi

          {
            echo "ManifestType: installer"
            echo "ManifestVersion: 1.6.0"
          } >> "$INSTALLER_FILE"

          {
            echo "PackageIdentifier: ${PKG_ID}"
            echo "PackageVersion: ${VERSION}"
            echo "PackageLocale: en-US"
            echo "Publisher: Rotstein"
            echo "PackageName: Smashed Pumpkin"
            echo "ShortDescription: Desktop management app for Pumpkin servers."
            echo "ManifestType: defaultLocale"
            echo "ManifestVersion: 1.6.0"
          } > "$LOCALE_FILE"

          {
            echo "PackageIdentifier: ${PKG_ID}"
            echo "PackageVersion: ${VERSION}"
            echo "DefaultLocale: en-US"
            echo "ManifestType: version"
            echo "ManifestVersion: 1.6.0"
          } > "$VERSION_FILE"

      - name: Upload winget manifests
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests
          path: winget/
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [linux-native, macos, windows, flatpak, winget-manifests]
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect installable files only
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          mkdir -p publish-assets

          for file in release-assets/**/smashed-pumpkin-linux-*.tar.gz; do cp "$file" publish-assets/; done
          for file in release-assets/**/smashed-pumpkin-macos-*.app.zip; do cp "$file" publish-assets/; done
          for file in release-assets/**/smashed-pumpkin-windows-*.msi; do cp "$file" publish-assets/; done
          for file in release-assets/**/SmashedPumpkin-*.flatpak; do cp "$file" publish-assets/; done

          count="$(find publish-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "$count" -eq 0 ]]; then
            echo "No installable release files found."
            exit 1
          fi

          echo "Publishing these files:"
          ls -1 publish-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: publish-assets/*
